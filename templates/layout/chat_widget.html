<!-- Floating Support Chat -->
<div id="chat-widget" class="chat-widget" style="display:none;">
  <div class="chat-header">
    <div class="d-flex align-items-center gap-2">
      <div class="chat-avatar"><i class="fas fa-headset"></i></div>
      <div>
        <div class="fw-semibold small">Support Team</div>
        <div class="d-flex align-items-center gap-1" style="font-size:.7rem;opacity:.8;">
          <span class="online-dot"></span> Online
        </div>
      </div>
    </div>
    <button onclick="toggleChat(false)" class="btn-close btn-close-white" style="font-size:.7rem;"></button>
  </div>
  <div class="chat-body" id="chat-messages">
    <div class="chat-bubble bot">
      <p class="mb-0">Hi! 👋 How can we help you today?</p>
    </div>
  </div>
  <div class="chat-footer">
    <input type="text" class="form-control form-control-sm rounded-pill" placeholder="Type a message…" id="chat-input" onkeydown="if(event.key==='Enter')sendChat()">
    <button class="btn-chat-send" onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
  </div>
</div>

<button class="chat-fab" id="chat-fab" onclick="toggleChat(true)" aria-label="Open support chat">
  <i class="fas fa-comments"></i>
  <span class="chat-badge">1</span>
</button>

<script>
function toggleChat(open) {
  const w = document.getElementById('chat-widget');
  const f = document.getElementById('chat-fab');
  w.style.display = open ? 'flex' : 'none';
  f.style.display = open ? 'none' : 'flex';
}
function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  const body = document.getElementById('chat-messages');
  body.innerHTML += `<div class="chat-bubble user"><p class="mb-0">${msg}</p></div>`;
  input.value = '';
  body.scrollTop = body.scrollHeight;
  setTimeout(() => {
    body.innerHTML += `<div class="chat-bubble bot"><p class="mb-0">Thanks for your message! Our team will respond shortly.</p></div>`;
    body.scrollTop = body.scrollHeight;
  }, 800);
}
</script>
