<!-- Chat widget placeholder -->
<div id="chat-widget" style="position:fixed;bottom:20px;right:20px;z-index:999;display:none;">
  <div class="card shadow" style="width:300px;">
    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
      <span><i class="fas fa-comments me-2"></i>Support Chat</span>
      <button class="btn btn-sm btn-link text-white p-0" onclick="document.getElementById('chat-widget').style.display='none'">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="card-body" style="height:200px;overflow-y:auto;" id="chat-messages">
      <p class="text-muted small">Chat support coming soon.</p>
    </div>
    <div class="card-footer p-1">
      <div class="input-group input-group-sm">
        <input type="text" class="form-control" placeholder="Type a message…" id="chat-input">
        <button class="btn btn-primary" type="button"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>
</div>
<button class="btn btn-primary rounded-circle shadow" style="position:fixed;bottom:20px;right:20px;z-index:1000;width:50px;height:50px;"
        onclick="document.getElementById('chat-widget').style.display='block';this.style.display='none';">
  <i class="fas fa-comments"></i>
</button>
