{% extends 'layout/base.html' %}
{% block title %}Forgot Password – JobPortal Pro{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card shadow border-0 rounded-4">
        <div class="card-body p-4">
          <div class="text-center mb-4">
            <i class="fas fa-key text-warning fa-3x mb-2"></i>
            <h4 class="fw-bold">Forgot Password</h4>
            <p class="text-muted small">Enter your email and we'll send an OTP</p>
          </div>
          <form method="POST">
            <div class="mb-3">
              <label class="form-label small fw-semibold">Email Address</label>
              <input type="email" name="user_email" class="form-control" required autofocus>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-bold">Send OTP</button>
          </form>
          <p class="text-center mt-3 small"><a href="{{ url_for('auth.login') }}">Back to Login</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
