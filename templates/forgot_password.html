{% extends 'layout/base.html' %}
{% block title %}Forgot Password – JobPortal Pro{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-blob auth-blob-1"></div>
  <div class="auth-blob auth-blob-2"></div>
  <div class="auth-card-wrap" data-aos="fade-up">
    <div class="auth-card">
      <div class="auth-card-header">
        <div class="auth-logo">
          <div class="brand-icon brand-icon-lg" style="background: linear-gradient(135deg,#f59e0b,#d97706);">
            <i class="fas fa-key"></i>
          </div>
        </div>
        <h2 class="auth-title">Forgot Password?</h2>
        <p class="auth-subtitle">Enter your email and we'll send you a one-time password</p>
      </div>
      <form method="POST" class="auth-form">
        <div class="input-icon-wrap">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" name="user_email" class="form-control auth-input" placeholder="Email address" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary-grad w-100 btn-auth-submit">
          <i class="fas fa-paper-plane me-2"></i>Send OTP
        </button>
      </form>
      <p class="auth-footer-text">
        <a href="{{ url_for('auth.login') }}" class="auth-link">
          <i class="fas fa-arrow-left me-1"></i>Back to Sign In
        </a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
