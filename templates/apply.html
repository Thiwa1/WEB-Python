{% extends 'layout/base.html' %}
{% block title %}Apply – {{ job.Job_role }} – JobPortal Pro{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0"><i class="fas fa-paper-plane me-2"></i>Guest Application</h5>
          <small>{{ job.Job_role }} – {{ job.District }}</small>
        </div>
        <div class="card-body p-4">
          <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
              <label class="form-label fw-semibold">Full Name *</label>
              <input type="text" name="guest_full_name" class="form-control" required>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Contact Number *</label>
                <input type="tel" name="guest_contact_no" class="form-control" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Gender *</label>
                <select name="guest_gender" class="form-select" required>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">CV / Resume * <small class="text-muted">(PDF, DOC, DOCX)</small></label>
              <input type="file" name="guest_cv" class="form-control" accept=".pdf,.doc,.docx" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Cover Letter <small class="text-muted">(optional)</small></label>
              <input type="file" name="guest_cover_letter" class="form-control" accept=".pdf,.doc,.docx">
            </div>
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary fw-bold">
                <i class="fas fa-paper-plane me-2"></i>Submit Application
              </button>
              <a href="{{ url_for('main.job_details', job_id=job.id) }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </form>
          <hr>
          <p class="text-center text-muted small">
            Have an account? <a href="{{ url_for('auth.login') }}">Login for faster applications</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
