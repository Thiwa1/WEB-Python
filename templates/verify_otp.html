{% extends 'layout/base.html' %}
{% block title %}Verify OTP – JobPortal Pro{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card shadow border-0 rounded-4">
        <div class="card-body p-4">
          <div class="text-center mb-4">
            <i class="fas fa-shield-alt text-success fa-3x mb-2"></i>
            <h4 class="fw-bold">Reset Password</h4>
            <p class="text-muted small">Enter the OTP sent to <strong>{{ email }}</strong></p>
          </div>
          <form method="POST">
            <input type="hidden" name="email" value="{{ email }}">
            <div class="mb-3">
              <label class="form-label small fw-semibold">OTP Code</label>
              <input type="text" name="otp" class="form-control form-control-lg text-center fw-bold"
                     maxlength="6" placeholder="000000" required autofocus>
            </div>
            <div class="mb-3">
              <label class="form-label small fw-semibold">New Password</label>
              <input type="password" name="new_password" class="form-control" minlength="8" required>
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold">Reset Password</button>
          </form>
          <p class="text-center mt-3 small">
            <a href="{{ url_for('auth.forgot_password') }}">Resend OTP</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
